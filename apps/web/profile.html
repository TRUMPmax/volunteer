<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人资料 - 社区志愿服务平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="profile">
    <div class="site-shell">
      <header class="topbar">
        <div class="site-head">
          <a class="site-title" href="/index.html">社区志愿服务平台</a>
          <span class="site-caption">个人资料</span>
        </div>
        <nav class="main-nav" id="main-nav">
          <a href="/index.html">首页</a>
          <a href="/activities.html">活动中心</a>
          <a href="/dashboard.html">工作台</a>
          <a href="/profile.html">个人资料</a>
        </nav>
      </header>

      <main class="page">
        <section class="panel panel-form">
          <div class="panel-head">
            <h2>资料维护</h2>
            <span id="profile-complete-status" class="chip"></span>
          </div>

          <form id="profile-form" class="form-grid form-grid-wide">
            <label class="field">
              <span>姓名</span>
              <input name="name" type="text" required />
            </label>
            <label class="field">
              <span>所属社区/机构</span>
              <input name="community" type="text" required />
            </label>
            <label class="field">
              <span>年龄</span>
              <input name="age" type="number" min="1" max="120" />
            </label>
            <label class="field">
              <span>性别</span>
              <select name="gender">
                <option value="">请选择</option>
                <option value="MALE">男</option>
                <option value="FEMALE">女</option>
                <option value="OTHER">其他</option>
              </select>
            </label>
            <label class="field field-span">
              <span>联系方式</span>
              <input name="contactPhone" type="text" placeholder="手机号、微信、邮箱等" />
            </label>
            <label class="field field-span" id="profile-proof-field" hidden>
              <span>组织者资质材料</span>
              <textarea name="verificationMaterials" rows="4"></textarea>
            </label>
            <label class="field field-span">
              <span>简介</span>
              <textarea name="bio" rows="5"></textarea>
            </label>
            <button class="button button-primary button-block field-span" type="submit">保存资料</button>
          </form>
          <div id="profile-feedback" class="feedback" hidden></div>
        </section>
      </main>
    </div>

    <script src="/app.js?v=20260404_6"></script>
  </body>
</html>
