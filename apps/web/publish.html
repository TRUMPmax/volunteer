<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>发起活动 - 社区志愿服务平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="publish">
    <div class="site-shell">
      <header class="topbar">
        <div class="site-head">
          <a class="site-title" href="/index.html">社区志愿服务平台</a>
          <span class="site-caption">活动申请</span>
        </div>
        <nav class="main-nav" id="main-nav">
          <a href="/index.html">首页</a>
          <a href="/activities.html">活动中心</a>
          <a href="/register.html">注册</a>
          <a href="/login.html">登录</a>
        </nav>
      </header>

      <main class="page page-publish">
        <section class="panel panel-form">
          <div class="panel-head">
            <h2>提交活动申请</h2>
          </div>
          <form id="publish-form" class="form-grid form-grid-wide">
            <label class="field">
              <span>活动标题</span>
              <input name="title" type="text" required />
            </label>
            <label class="field">
              <span>活动分类</span>
              <input name="category" type="text" required />
            </label>
            <label class="field">
              <span>活动地点</span>
              <input name="location" type="text" required />
            </label>
            <label class="field">
              <span>联系电话</span>
              <input name="contactMobile" type="tel" required />
            </label>
            <label class="field">
              <span>开始时间</span>
              <input name="startAt" type="datetime-local" required />
            </label>
            <label class="field">
              <span>结束时间</span>
              <input name="endAt" type="datetime-local" required />
            </label>
            <label class="field">
              <span>人数上限</span>
              <input name="capacity" type="number" min="1" required />
            </label>
            <label class="field">
              <span>活动封面</span>
              <input id="publish-cover-file" name="coverFile" type="file" accept="image/*" required />
            </label>
            <div class="field field-span">
              <span>封面预览</span>
              <div class="cover-preview-wrap">
                <img id="publish-cover-preview" class="cover-preview" alt="封面预览" />
              </div>
            </div>
            <label class="field field-span">
              <span>活动说明</span>
              <textarea name="description" rows="6" required></textarea>
            </label>
            <button class="button button-primary button-block field-span" type="submit">提交申请</button>
          </form>
          <div id="publish-feedback" class="feedback" hidden></div>
        </section>
      </main>
    </div>

    <script src="/app.js?v=20260405_2"></script>
  </body>
</html>
