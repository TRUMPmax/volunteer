<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理员后台 - 社区志愿服务平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="admin-dashboard">
    <div class="site-shell">
      <header class="topbar">
        <div class="site-head">
          <a class="site-title" href="/index.html">社区志愿服务平台</a>
          <span class="site-caption">管理员后台</span>
        </div>
        <nav class="main-nav" id="main-nav">
          <a href="/admin-dashboard.html">审核中心</a>
          <a href="/activities.html">活动中心</a>
        </nav>
      </header>

      <main class="page">

        <!-- 审核区域 -->
        <section class="panel-row">
          <section class="panel">
            <div class="panel-head">
              <h2>组织者审核</h2>
            </div>
            <div id="admin-org-list" class="list-panel"></div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>活动申请审核</h2>
            </div>
            <div id="admin-proposal-list" class="list-panel"></div>
          </section>
        </section>

        <!-- 活动管理 -->
        <section class="panel">
          <div class="panel-head">
            <h2>活动管理</h2>
            <span class="item-meta">管理员可关闭不合规活动</span>
          </div>
          <div id="admin-activity-list" class="list-panel"></div>
        </section>

        <!-- 用户管理 -->
        <section class="panel">
          <div class="panel-head">
            <h2>用户管理</h2>
          </div>
          <div class="toolbar" style="padding: 0 0 1rem 0;">
            <label class="field field-inline">
              <span>角色筛选</span>
              <select id="admin-user-role-filter">
                <option value="">全部</option>
                <option value="volunteer">志愿者</option>
                <option value="organization">组织者</option>
              </select>
            </label>
          </div>
          <div id="admin-user-list" class="list-panel"></div>
        </section>

        <!-- 发布平台公告 -->
        <section class="panel panel-form">
          <div class="panel-head">
            <h2>发布平台公告</h2>
          </div>
          <form id="admin-notice-form" class="form-grid form-grid-wide">
            <label class="field">
              <span>公告标题</span>
              <input name="title" type="text" required placeholder="公告标题" />
            </label>
            <label class="field">
              <span>目标受众</span>
              <select name="audience">
                <option value="ALL">全体用户</option>
                <option value="volunteer">志愿者</option>
                <option value="organization">组织者</option>
              </select>
            </label>
            <label class="field">
              <span>公告级别</span>
              <select name="level">
                <option value="NOTICE">普通通知</option>
                <option value="IMPORTANT">重要通知</option>
              </select>
            </label>
            <label class="field field-span">
              <span>公告内容</span>
              <textarea name="content" rows="4" required placeholder="请填写公告正文"></textarea>
            </label>
            <button class="button button-primary field-span" type="submit">发布公告</button>
          </form>
          <div id="admin-notice-feedback" class="feedback" hidden></div>

          <div class="panel-head" style="margin-top: 1.5rem;">
            <h3>历史公告</h3>
          </div>
          <div id="admin-notices-pagination" class="pagination"></div>
          <div id="admin-notices-list" class="list-panel"></div>
        </section>

      </main>
    </div>

    <script src="/app.js?v=20260405_4"></script>
  </body>
</html>
