<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 社区志愿服务平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="login">
    <div class="site-shell">
      <header class="topbar">
        <div class="site-head">
          <a class="site-title" href="/index.html">社区志愿服务平台</a>
          <span class="site-caption">登录</span>
        </div>
        <nav class="main-nav" id="main-nav">
          <a href="/index.html">首页</a>
          <a href="/activities.html">活动中心</a>
          <a href="/register.html">注册</a>
          <a href="/login.html">登录</a>
          <a href="/admin-login.html">管理员入口</a>
        </nav>
      </header>

      <main class="page page-auth">
        <section class="auth-box">
          <div class="auth-side">
            <h1>登录工作台</h1>
            <div class="role-switch" id="login-role-switch">
              <button class="role-switch-button is-active" type="button" data-role="volunteer">志愿者</button>
              <button class="role-switch-button" type="button" data-role="organization">组织者</button>
            </div>
            <a class="text-link" href="/admin-login.html">平台工作人员请使用管理员入口</a>
          </div>

          <div class="auth-card">
            <form id="login-form" class="form-grid" method="post">
              <input id="login-role" type="hidden" name="role" value="volunteer" />
              <label class="field">
                <span>手机号</span>
                <input name="mobile" type="tel" required />
              </label>
              <label class="field">
                <span>密码</span>
                <input name="password" type="password" required />
              </label>
              <button class="button button-primary button-block" type="submit">登录</button>
            </form>
            <div id="login-feedback" class="feedback" hidden></div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js?v=20260404_8"></script>
  </body>
</html>
